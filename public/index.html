<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TaskForge — Test Console</title>
<style>
  :root {
    --bg: #0d0e10;
    --bg-2: #16181d;
    --bg-3: #1f2229;
    --border: #2a2e36;
    --text: #e6e7e9;
    --text-dim: #8b92a0;
    --text-faint: #5b6170;
    --accent: #f59e0b;
    --p0: #ef4444;
    --p1: #f97316;
    --p2: #eab308;
    --p3: #3b82f6;
    --p4: #6b7280;
    --ok: #22c55e;
    --err: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  code, pre, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-2);
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header h1 .sub { color: var(--text-faint); font-weight: 400; margin-left: 8px; }

  .status-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 12px;
  }
  .status-bar .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.err { background: var(--err); box-shadow: 0 0 8px var(--err); }

  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .toolbar button {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .toolbar button:hover { background: #262a32; }
  .toolbar button.primary {
    background: var(--accent);
    color: #1a1006;
    border-color: var(--accent);
    font-weight: 600;
  }
  .toolbar button.primary:hover { background: #fbb333; }

  .severity-section { margin-bottom: 24px; }
  .severity-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .severity-header h2 {
    font-size: 13px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .severity-header .count { color: var(--text-faint); font-size: 12px; }

  .bug-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 12px;
  }

  .bug-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .bug-card:hover { border-color: #3a3f48; }
  .bug-card.fired-ok { border-color: var(--ok); }
  .bug-card.fired-err { border-color: var(--err); }

  .bug-head {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    color: white;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .badge.p0 { background: var(--p0); }
  .badge.p1 { background: var(--p1); }
  .badge.p2 { background: var(--p2); color: #1a1300; }
  .badge.p3 { background: var(--p3); }
  .badge.p4 { background: var(--p4); }

  .bug-title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
  }
  .bug-id {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 2px;
  }
  .bug-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .bug-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .bug-meta {
    font-size: 11px;
    color: var(--text-faint);
  }
  .bug-meta .verb {
    color: var(--text-dim);
    font-weight: 600;
  }
  .fire-btn {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    min-width: 64px;
  }
  .fire-btn:hover { background: #2c303a; border-color: #3a3f48; }
  .fire-btn:disabled { opacity: 0.5; cursor: wait; }
  .fire-btn.fired-ok { background: rgba(34, 197, 94, 0.15); border-color: var(--ok); color: var(--ok); }
  .fire-btn.fired-err { background: rgba(239, 68, 68, 0.15); border-color: var(--err); color: var(--err); }

  .console {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: calc(100vh - 130px);
    position: sticky;
    top: 24px;
    display: flex;
    flex-direction: column;
  }
  .console-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .console-head h3 { margin: 0; font-size: 12px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.5px; }
  .console-clear {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 6px;
    font-family: inherit;
  }
  .console-clear:hover { color: var(--text); }
  .console-log {
    overflow-y: auto;
    padding: 12px 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    flex: 1;
  }
  .log-entry {
    display: grid;
    grid-template-columns: 60px 50px 1fr;
    gap: 8px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .log-time { color: var(--text-faint); }
  .log-status {
    font-weight: 600;
    text-align: right;
  }
  .log-status.ok { color: var(--ok); }
  .log-status.err { color: var(--err); }
  .log-msg { color: var(--text-dim); word-break: break-word; }
  .log-msg .bug-id { color: var(--accent); }

  .empty-log {
    color: var(--text-faint);
    font-size: 12px;
    text-align: center;
    padding: 32px 16px;
    font-family: inherit;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    text-align: center;
    color: var(--text-faint);
    font-size: 11px;
  }
  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--text); }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .console { position: static; height: 320px; }
  }
</style>
</head>
<body>
  <header>
    <h1>
      TaskForge <span class="sub">Test Console</span>
    </h1>
    <div class="status-bar">
      <span class="pill" id="status-server"><span class="dot" id="dot-server"></span><span id="text-server">checking…</span></span>
      <span class="pill" id="status-sentry"><span class="dot" id="dot-sentry"></span><span id="text-sentry">sentry</span></span>
      <span class="pill" id="status-auth"><span class="dot" id="dot-auth"></span><span id="text-auth">auth</span></span>
    </div>
  </header>

  <main>
    <section>
      <div class="toolbar">
        <button class="primary" data-fire="all">Fire all bugs</button>
        <button data-fire="P0">Fire P0</button>
        <button data-fire="P1">Fire P1</button>
        <button data-fire="P2">Fire P2</button>
        <button data-fire="P3">Fire P3</button>
        <button data-fire="P4">Fire P4</button>
      </div>
      <div id="bug-sections"></div>
    </section>
    <aside>
      <div class="console">
        <div class="console-head">
          <h3>Activity</h3>
          <button class="console-clear" id="clear-log">Clear</button>
        </div>
        <div class="console-log" id="log">
          <div class="empty-log">No triggers fired yet.</div>
        </div>
      </div>
    </aside>
  </main>

  <footer>
    Triggers fire real HTTP requests against this app. Errors surface to Sentry if <code>SENTRY_DSN</code> is configured.
  </footer>

<script>
const BASE = window.location.origin;
const tokens = {};
let bugs = [];

function pill(id, dotClass, text) {
  document.getElementById('dot-' + id).className = 'dot ' + dotClass;
  document.getElementById('text-' + id).textContent = text;
}

function log(message, statusClass = '') {
  const wrap = document.getElementById('log');
  const empty = wrap.querySelector('.empty-log');
  if (empty) empty.remove();
  const t = new Date().toLocaleTimeString('en-US', { hour12: false });
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${t}</span><span class="log-status ${statusClass}">${message.status || ''}</span><span class="log-msg">${message.text}</span>`;
  wrap.appendChild(entry);
  wrap.scrollTop = wrap.scrollHeight;
}

async function checkHealth() {
  try {
    const res = await fetch(BASE + '/health');
    if (res.ok) {
      const data = await res.json();
      pill('server', 'ok', `server up · ${data.users} users`);
      return true;
    }
    pill('server', 'err', `server ${res.status}`);
  } catch {
    pill('server', 'err', 'server unreachable');
  }
  return false;
}

async function login(email) {
  const res = await fetch(BASE + '/auth/login', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ email, password: 'password123' }),
  });
  if (!res.ok) throw new Error('login failed: ' + res.status);
  return (await res.json()).token;
}

async function authenticate() {
  try {
    tokens.user = await login('bob@taskforge.io');
    tokens.admin = await login('alice@taskforge.io');
    pill('auth', 'ok', 'logged in as bob + alice');
    return true;
  } catch (e) {
    pill('auth', 'err', e.message);
    return false;
  }
}

async function fireRequest(spec) {
  const headers = Object.assign({}, spec.headers || {});
  if (spec.auth === 'user') headers.authorization = 'Bearer ' + tokens.user;
  if (spec.auth === 'admin') headers.authorization = 'Bearer ' + tokens.admin;
  if (spec.body) headers['content-type'] = 'application/json';
  const res = await fetch(BASE + spec.path, {
    method: spec.method,
    headers,
    body: spec.body ? JSON.stringify(spec.body) : undefined,
  });
  return { status: res.status };
}

async function fireBug(bug) {
  const card = document.querySelector(`[data-bug-id="${bug.id}"]`);
  const btn = card.querySelector('.fire-btn');
  card.classList.remove('fired-ok', 'fired-err');
  btn.disabled = true;
  btn.textContent = '…firing';

  const repeat = bug.repeat || 1;
  let lastStatus = null;
  let error = null;
  try {
    for (let i = 0; i < repeat; i++) {
      const r = await fireRequest(bug.request);
      lastStatus = r.status;
    }
  } catch (e) {
    error = e.message;
  }

  btn.disabled = false;
  if (error) {
    btn.textContent = 'fetch err';
    btn.className = 'fire-btn fired-err';
    card.classList.add('fired-err');
    log({ status: '×', text: `<span class="bug-id">${bug.id}</span> ${error}` }, 'err');
  } else {
    const ok = lastStatus >= 500 || lastStatus === 200 || lastStatus === 202;
    const cls = lastStatus >= 500 ? 'err' : 'ok';
    btn.textContent = lastStatus + (repeat > 1 ? ` ×${repeat}` : '');
    btn.className = 'fire-btn fired-' + cls;
    card.classList.add('fired-' + cls);
    log({
      status: lastStatus,
      text: `<span class="bug-id">${bug.id}</span> ${bug.request.method} ${bug.request.path}${repeat > 1 ? ` (×${repeat})` : ''}`
    }, cls);
  }

  setTimeout(() => {
    btn.textContent = 'Fire';
    btn.className = 'fire-btn';
    card.classList.remove('fired-ok', 'fired-err');
  }, 4000);
}

async function fireMany(filter) {
  const target = filter === 'all' ? bugs : bugs.filter(b => b.severity === filter);
  for (const bug of target) {
    await fireBug(bug);
    await new Promise(r => setTimeout(r, 200));
  }
}

function renderBugs() {
  const sections = document.getElementById('bug-sections');
  const grouped = bugs.reduce((acc, b) => {
    (acc[b.severity] = acc[b.severity] || []).push(b);
    return acc;
  }, {});
  const order = ['P0', 'P1', 'P2', 'P3', 'P4'];
  sections.innerHTML = order.filter(s => grouped[s]).map(sev => `
    <div class="severity-section">
      <div class="severity-header">
        <span class="badge ${sev.toLowerCase()}">${sev}</span>
        <h2>${sevLabel(sev)}</h2>
        <span class="count">${grouped[sev].length} bugs</span>
      </div>
      <div class="bug-grid">
        ${grouped[sev].map(bug => `
          <div class="bug-card" data-bug-id="${bug.id}">
            <div class="bug-head">
              <span class="badge ${sev.toLowerCase()}">${sev}</span>
              <div>
                <div class="bug-title">${bug.title}</div>
                <div class="bug-id mono">${bug.id}</div>
              </div>
            </div>
            <div class="bug-desc">${bug.description}</div>
            <div class="bug-foot">
              <div class="bug-meta mono">
                <span class="verb">${bug.request.method}</span> ${bug.request.path}${bug.repeat ? ` ×${bug.repeat}` : ''}
              </div>
              <button class="fire-btn">Fire</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  sections.querySelectorAll('.bug-card').forEach(card => {
    card.querySelector('.fire-btn').addEventListener('click', () => {
      const id = card.dataset.bugId;
      const bug = bugs.find(b => b.id === id);
      fireBug(bug);
    });
  });
}

function sevLabel(sev) {
  return {
    P0: 'Critical — security or data loss',
    P1: 'High — major feature broken',
    P2: 'Medium — degraded at scale',
    P3: 'Low — edge cases',
    P4: 'Trivial — noise',
  }[sev];
}

document.querySelectorAll('[data-fire]').forEach(btn => {
  btn.addEventListener('click', () => fireMany(btn.dataset.fire));
});
document.getElementById('clear-log').addEventListener('click', () => {
  document.getElementById('log').innerHTML = '<div class="empty-log">No triggers fired yet.</div>';
});

(async () => {
  pill('sentry', '', 'sentry: unknown');
  const meta = await fetch(BASE + '/_test/meta').then(r => r.json()).catch(() => null);
  if (meta) {
    pill('sentry', meta.sentry_configured ? 'ok' : 'err',
      meta.sentry_configured ? `sentry · ${meta.environment}` : 'sentry not configured');
  }
  bugs = await fetch(BASE + '/_test/bugs').then(r => r.json());
  renderBugs();
  await checkHealth();
  await authenticate();
})();
</script>
</body>
</html>
